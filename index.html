<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平均数学习 - 交互式教学工具</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <!-- 统一的 Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#60a5fa',
                        accent: '#f97316',
                        neutral: '#f1f5f9',
                        'neutral-dark': '#94a3b8'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .transition-all-300 {
                transition: all 300ms ease-in-out;
            }
            .btn-hover:hover {
                @apply transform -translate-y-0.5 shadow-md;
            }
            .table-row-hover:hover {
                @apply bg-blue-50;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- 页面标题 -->
        <header class="mb-8 text-center">
            <h1 class="text-4xl md:text-5xl font-bold text-gray-800 mb-2">平均数学习工具</h1>
            <!-- 描述文字已删除 -->
        </header>

        <!-- 主要内容区 -->
        <main class="flex flex-col lg:flex-row gap-6">
            <!-- 左侧：数据操作区 -->
	    <section class="w-full lg:w-[22%] bg-white rounded-xl shadow-card p-6">
                <h2 class="text-2xl font-semibold text-gray-800 mb-6 flex items-center">
                    <i class="fa fa-table mr-2 text-primary"></i>数据操作区
                </h2>
                
                <!-- 数据表格 -->
                <div class="overflow-x-auto mb-6">
                    <table class="min-w-full bg-white border border-gray-200 rounded-lg">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="py-4 px-4 text-left text-sm font-medium text-gray-500 uppercase tracking-wider border-b whitespace-nowrap">序号</th>
                                <th class="py-4 px-4 text-left text-sm font-medium text-gray-500 uppercase tracking-wider border-b whitespace-nowrap">数据</th>
                                <th class="py-4 px-4 text-left text-sm font-medium text-gray-500 uppercase tracking-wider border-b whitespace-nowrap">平均数</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody">
                            <!-- 表格内容将通过JavaScript动态生成 -->
                        </tbody>
                    </table>
                </div>
                
                <!-- 操作按钮 -->
                <div class="flex flex-col gap-4">
                    <!-- 第一行：随机增加、修改数据 -->
                    <div class="flex gap-4">
                        <button id="randomAddBtn" class="flex-1 flex items-center justify-center py-2 px-4 bg-green-500 hover:bg-green-600 text-white font-medium rounded-lg transition-all-300 btn-hover whitespace-pre-line leading-tight">
                            <i class="fa fa-random mr-2"></i>随机&#10;增加
                        </button>
                        <button id="modifyBtn" class="flex-1 flex items-center justify-center py-2 px-4 bg-accent hover:bg-orange-600 text-white font-medium rounded-lg transition-all-300 btn-hover whitespace-pre-line leading-tight">
                            <i class="fa fa-pencil mr-2"></i>修改&#10;数据
                        </button>
                    </div>
                    
                    <!-- 第二行：增加一组、增加多组 -->
                    <div class="flex gap-4">
                        <button id="addSingleBtn" class="flex-1 flex items-center justify-center py-2 px-4 bg-primary hover:bg-blue-600 text-white font-medium rounded-lg transition-all-300 btn-hover whitespace-pre-line leading-tight">
                            <i class="fa fa-plus-circle mr-2"></i>增加&#10;一组
                        </button>
                        <button id="addMultipleBtn" class="flex-1 flex items-center justify-center py-2 px-4 bg-secondary hover:bg-blue-500 text-white font-medium rounded-lg transition-all-300 btn-hover whitespace-pre-line leading-tight">
                            <i class="fa fa-plus-square mr-2"></i>增加&#10;多组
                        </button>
                    </div>
                    
                    <!-- 第三行：删除数据、清空数据 -->
                    <div class="flex gap-4">
                        <button id="deleteBtn" class="flex-1 flex items-center justify-center py-2 px-4 bg-red-500 hover:bg-red-600 text-white font-medium rounded-lg transition-all-300 btn-hover whitespace-pre-line leading-tight">
                            <i class="fa fa-trash mr-2"></i>删除&#10;数据
                        </button>
                        <button id="clearAllBtn" class="flex-1 flex items-center justify-center py-2 px-4 bg-red-600 hover:bg-red-700 text-white font-medium rounded-lg transition-all-300 btn-hover whitespace-pre-line leading-tight">
                            <i class="fa fa-trash-o mr-2"></i>清空&#10;数据
                        </button>
                    </div>
                </div>
            </section>

            <!-- 右侧：数据可视化区 -->
	    <section class="w-full lg:w-[78%] bg-white rounded-xl shadow-card p-6">
                <h2 class="text-2xl font-semibold text-gray-800 mb-6 flex items-center">
                    <i class="fa fa-bar-chart mr-2 text-primary"></i>数据可视化区
                </h2>
                
                <!-- 图表容器 -->
                <div class="relative h-[550px] w-full">
                    <canvas id="dataChart"></canvas>

                </div>
                
                <!-- 统计信息 -->
                <div class="mt-6 grid grid-cols-3 gap-4">
                    <div class="bg-blue-50 p-4 rounded-lg">
                        <h3 class="text-base font-medium text-gray-500 mb-2">数据总和</h3>
                        <p id="sumValue" class="text-3xl font-bold text-primary">0</p>
                    </div>
                    <div class="bg-orange-50 p-4 rounded-lg">
                        <h3 class="text-base font-medium text-gray-500 mb-2">数据个数</h3>
                        <p id="countValue" class="text-3xl font-bold text-accent">0</p>
                    </div>
                    <div class="bg-red-50 p-4 rounded-lg">
                        <h3 class="text-base font-medium text-gray-500 mb-2">当前平均数</h3>
                        <p id="currentAvgValue" class="text-3xl font-bold text-red-600">0.00</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- 教学提示已删除 -->
    </div>

    <!-- 模态框 - 增加单组数据 -->
    <div id="addSingleModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg p-6 w-full max-w-md transform transition-all">
            <h3 class="text-xl font-semibold text-gray-800 mb-6">增加一组数据</h3>
            <div class="mb-4">
                <label for="singleDataInput" class="block text-base font-medium text-gray-700 mb-2">请输入数据值：</label>
                <input type="number" id="singleDataInput" class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-lg" placeholder="例如：85">
            </div>
            <div class="flex justify-end gap-4 mt-6">
                <button id="cancelAddSingle" class="px-6 py-3 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 text-lg">取消</button>
                <button id="confirmAddSingle" class="px-6 py-3 bg-primary text-white rounded-md hover:bg-blue-600 text-lg">确认添加</button>
            </div>
        </div>
    </div>

    <!-- 模态框 - 增加多组数据 -->
    <div id="addMultipleModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg p-6 w-full max-w-md transform transition-all">
            <h3 class="text-xl font-semibold text-gray-800 mb-6">增加多组数据</h3>
            <div class="mb-4">
                <label for="multipleDataInput" class="block text-base font-medium text-gray-700 mb-2">请输入多组数据（用逗号分隔）：</label>
                <input type="text" id="multipleDataInput" class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-lg" placeholder="例如：85,90,78,92">
            </div>
            <div class="flex justify-end gap-4 mt-6">
                <button id="cancelAddMultiple" class="px-6 py-3 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 text-lg">取消</button>
                <button id="confirmAddMultiple" class="px-6 py-3 bg-primary text-white rounded-md hover:bg-blue-600 text-lg">确认添加</button>
            </div>
        </div>
    </div>

    <!-- 模态框 - 删除数据 -->
    <div id="deleteModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg p-6 w-full max-w-md transform transition-all">
            <h3 class="text-xl font-semibold text-gray-800 mb-6">删除数据</h3>
            <div class="mb-4">
                <label for="deleteIndexInput" class="block text-base font-medium text-gray-700 mb-2">请输入要删除的数据序号：</label>
                <input type="number" id="deleteIndexInput" class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-lg" placeholder="例如：1">
            </div>
            <div class="flex justify-end gap-4 mt-6">
                <button id="cancelDelete" class="px-6 py-3 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 text-lg">取消</button>
                <button id="confirmDelete" class="px-6 py-3 bg-red-500 text-white rounded-md hover:bg-red-600 text-lg">确认删除</button>
            </div>
        </div>
    </div>

    <!-- 模态框 - 修改数据 -->
    <div id="modifyModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg p-6 w-full max-w-md transform transition-all">
            <h3 class="text-xl font-semibold text-gray-800 mb-6">修改数据</h3>
            <div class="mb-4">
                <label for="modifyIndexInput" class="block text-base font-medium text-gray-700 mb-2">请输入要修改的数据序号：</label>
                <input type="number" id="modifyIndexInput" class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-lg" placeholder="例如：1">
            </div>
            <div class="mb-4">
                <label for="modifyValueInput" class="block text-base font-medium text-gray-700 mb-2">请输入新的数据值：</label>
                <input type="number" id="modifyValueInput" class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-lg" placeholder="例如：95">
            </div>
            <div class="flex justify-end gap-4 mt-6">
                <button id="cancelModify" class="px-6 py-3 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 text-lg">取消</button>
                <button id="confirmModify" class="px-6 py-3 bg-accent text-white rounded-md hover:bg-orange-600 text-lg">确认修改</button>
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div id="toast" class="fixed bottom-6 right-6 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50 text-lg">
        <span id="toastMessage"></span>
    </div>

    <script>
        // 全局变量
        let dataArray = [];
        let chart = null;

        // DOM 元素
        const dataTableBody = document.getElementById('dataTableBody');
        const sumValue = document.getElementById('sumValue');
        const countValue = document.getElementById('countValue');
        
        // 模态框元素
        const addSingleModal = document.getElementById('addSingleModal');
        const addMultipleModal = document.getElementById('addMultipleModal');
        const deleteModal = document.getElementById('deleteModal');
        const modifyModal = document.getElementById('modifyModal');
        
        // 按钮元素
        const addSingleBtn = document.getElementById('addSingleBtn');
        const addMultipleBtn = document.getElementById('addMultipleBtn');
        const deleteBtn = document.getElementById('deleteBtn');
        const modifyBtn = document.getElementById('modifyBtn');
        
        // 确认/取消按钮
        const cancelAddSingle = document.getElementById('cancelAddSingle');
        const confirmAddSingle = document.getElementById('confirmAddSingle');
        const cancelAddMultiple = document.getElementById('cancelAddMultiple');
        const confirmAddMultiple = document.getElementById('confirmAddMultiple');
        const cancelDelete = document.getElementById('cancelDelete');
        const confirmDelete = document.getElementById('confirmDelete');
        const cancelModify = document.getElementById('cancelModify');
        const confirmModify = document.getElementById('confirmModify');
        
        // 输入框元素
        const singleDataInput = document.getElementById('singleDataInput');
        const multipleDataInput = document.getElementById('multipleDataInput');
        const deleteIndexInput = document.getElementById('deleteIndexInput');
        const modifyIndexInput = document.getElementById('modifyIndexInput');
        const modifyValueInput = document.getElementById('modifyValueInput');
        
        // 提示消息元素
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        // 初始化图表
        function initChart() {
            const ctx = document.getElementById('dataChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: '数据值',
                            data: [],
                            backgroundColor: '#3b82f6',
                            borderColor: '#2563eb',
                            borderWidth: 1,
                            borderRadius: 4,
                            barThickness: 'flex',
                            maxBarThickness: 40,
                            minBarLength: 5
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        annotation: {
                            annotations: {}
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            },
                            ticks: {
                                font: {
                                    weight: 'bold',
                                    size: 14
                                }
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            }
                        },

                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.7)',
                            padding: 10,
                            cornerRadius: 4,
                            titleFont: {
                                size: 14
                            },
                            bodyFont: {
                                size: 13
                            }
                        }
                    },
                    layout: {
                        padding: {
                            left: 10,
                            right: 10
                        }
                    },
                    animation: {
                        duration: 500,
                        easing: 'easeOutQuart'
                    }
                }
            });
        }

        // 更新表格
        function updateTable() {
            dataTableBody.innerHTML = '';
            
            if (dataArray.length === 0) {
                const emptyRow = document.createElement('tr');
                emptyRow.innerHTML = `
                    <td colspan="3" class="py-4 px-4 text-center text-gray-500">暂无数据，请添加数据</td>
                `;
                dataTableBody.appendChild(emptyRow);
                return;
            }
            
            dataArray.forEach((value, index) => {
                // 计算到当前行为止的平均数
                const currentData = dataArray.slice(0, index + 1);
                const currentAverage = currentData.reduce((acc, val) => acc + val, 0) / currentData.length;
                
                const row = document.createElement('tr');
                row.className = 'table-row-hover transition-all-300';
                row.innerHTML = `
                    <td class="py-4 px-4 border-b text-base">${index + 1}</td>
                    <td class="py-4 px-4 border-b font-bold text-base ${index > 0 && value < dataArray.slice(0, index).reduce((a, b) => a + b, 0) / index - 20 ? 'text-red-600' : ''}">${value}</td>
                    <td class="py-4 px-4 border-b text-primary font-bold text-base">${currentAverage.toFixed(2)}</td>
                `;
                dataTableBody.appendChild(row);
            });
        }

        // 更新图表
        function updateChart() {
            chart.data.labels = dataArray.map((_, index) => `${index + 1}`);
            // 设置柱状图数据和颜色
            chart.data.datasets[0].data = dataArray;
            
            // 如果数据比上一次平均数小20及以上，标红显示
            chart.data.datasets[0].backgroundColor = dataArray.map((value, index) => {
                if (index === 0) return '#3b82f6'; // 第一个数据点使用默认颜色
                
                const prevAverage = dataArray.slice(0, index).reduce((a, b) => a + b, 0) / index;
                return value < prevAverage - 20 ? 'rgba(220, 38, 38, 0.7)' : '#3b82f6';
            });
            
            // 计算当前平均数
            const currentAvg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
            
            // 更新或创建平均线注释
            if (chart.options.plugins.annotation) {
                // 如果已有注释，更新它
                if (chart.options.plugins.annotation.annotations.averageLine) {
                    chart.options.plugins.annotation.annotations.averageLine.value = currentAvg;
                } else {
                    // 否则创建新注释
                    chart.options.plugins.annotation.annotations.averageLine = {
                        type: 'line',
                        scaleID: 'y',
                        value: currentAvg,
                        borderColor: 'rgba(220, 38, 38, 1)',
                        borderWidth: 3,
                        borderDash: [5, 5],
                        label: {
                            content: `平均数: ${currentAvg.toFixed(2)}`,
                            enabled: true,
                            position: 'end',
                            backgroundColor: 'rgba(220, 38, 38, 0.8)',
                            color: '#fff',
                            font: {
                                size: 14,
                                weight: 'bold'
                            }
                        }
                    };
                }
            }
            
            chart.update();
        }

        // 更新统计信息
        function updateStatistics() {
            const sum = dataArray.reduce((acc, val) => acc + val, 0);
            sumValue.textContent = sum.toFixed(2);
            countValue.textContent = dataArray.length;
            
            // 更新当前平均数显示
            const currentAvg = dataArray.length > 0 ? sum / dataArray.length : 0;
            document.getElementById('currentAvgValue').textContent = currentAvg.toFixed(2);
        }

        // 计算平均数
        function calculateAverage() {
            if (dataArray.length === 0) return 0;
            const sum = dataArray.reduce((acc, val) => acc + val, 0);
            return sum / dataArray.length;
        }

        // 显示提示消息
        function showToast(message, type = 'success') {
            toastMessage.textContent = message;
            
            // 设置颜色
            if (type === 'success') {
                toast.className = toast.className.replace(/bg-\w+-500/, 'bg-green-500');
            } else if (type === 'error') {
                toast.className = toast.className.replace(/bg-\w+-500/, 'bg-red-500');
            } else if (type === 'info') {
                toast.className = toast.className.replace(/bg-\w+-500/, 'bg-blue-500');
            }
            
            // 显示提示
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            // 3秒后隐藏
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // 重置所有输入框
        function resetInputs() {
            singleDataInput.value = '';
            multipleDataInput.value = '';
            deleteIndexInput.value = '';
            modifyIndexInput.value = '';
            modifyValueInput.value = '';
        }

        // 隐藏所有模态框
        function hideAllModals() {
            addSingleModal.classList.add('hidden');
            addMultipleModal.classList.add('hidden');
            deleteModal.classList.add('hidden');
            modifyModal.classList.add('hidden');
            resetInputs();
        }

        // 更新所有视图
        function updateAll() {
            updateTable();
            updateChart();
            
            // 如果数据过多，调整图表配置
            if (dataArray.length > 10) {
                chart.options.scales.x.maxTicksLimit = 10;
                chart.options.scales.x.ticks.maxRotation = 45;
                chart.options.scales.x.ticks.minRotation = 45;
            } else {
                chart.options.scales.x.maxTicksLimit = undefined;
                chart.options.scales.x.ticks.maxRotation = 0;
                chart.options.scales.x.ticks.minRotation = 0;
            }
            updateStatistics();
        }

        // 添加单组数据
        function addSingleData() {
            const value = parseFloat(singleDataInput.value);
            
            if (isNaN(value)) {
                showToast('请输入有效的数字', 'error');
                return;
            }
            
            dataArray.push(value);
            updateAll();
            hideAllModals();
            showToast('数据添加成功！');
        }

        // 添加多组数据
        function addMultipleData() {
            const input = multipleDataInput.value;
            
            if (!input.trim()) {
                showToast('请输入数据', 'error');
                return;
            }
            
            const values = input.split(',')
                .map(item => item.trim())
                .filter(item => item !== '')
                .map(item => parseFloat(item))
                .filter(item => !isNaN(item));
            
            if (values.length === 0) {
                showToast('没有有效的数据被添加', 'error');
                return;
            }
            
            dataArray.push(...values);
            updateAll();
            hideAllModals();
            showToast(`成功添加 ${values.length} 组数据！`);
        }

        // 删除数据
        function deleteData() {
            const index = parseInt(deleteIndexInput.value) - 1;
            
            if (isNaN(index) || index < 0 || index >= dataArray.length) {
                showToast('请输入有效的序号', 'error');
                return;
            }
            
            dataArray.splice(index, 1);
            updateAll();
            hideAllModals();
            showToast('数据删除成功！');
        }

        // 修改数据
        function modifyData() {
            const index = parseInt(modifyIndexInput.value) - 1;
            const value = parseFloat(modifyValueInput.value);
            
            if (isNaN(index) || index < 0 || index >= dataArray.length) {
                showToast('请输入有效的序号', 'error');
                return;
            }
            
            if (isNaN(value)) {
                showToast('请输入有效的数字', 'error');
                return;
            }
            
            dataArray[index] = value;
            updateAll();
            hideAllModals();
            showToast('数据修改成功！');
        }

        // 随机增加一组数据
        function addRandomData() {
            const randomValue = Math.floor(Math.random() * 100) + 1; // 生成1-100的随机数
            dataArray.push(randomValue);
            updateAll();
            showToast(`已随机添加数据：${randomValue}`);
        }

        // 清空所有数据
        function clearAllData() {
            if (dataArray.length === 0) {
                showToast('暂无数据可清空', 'info');
                return;
            }
            
            if (confirm('确定要删除所有数据吗？此操作不可撤销。')) {
                dataArray = [];
                updateAll();
                showToast('所有数据已清空！');
            }
        }

        // 事件监听器
        function setupEventListeners() {
            // 按钮点击事件
            addSingleBtn.addEventListener('click', () => {
                addSingleModal.classList.remove('hidden');
                singleDataInput.focus();
            });
            
            addMultipleBtn.addEventListener('click', () => {
                addMultipleModal.classList.remove('hidden');
                multipleDataInput.focus();
            });
            
            deleteBtn.addEventListener('click', () => {
                if (dataArray.length === 0) {
                    showToast('暂无数据可删除', 'info');
                    return;
                }
                deleteModal.classList.remove('hidden');
                deleteIndexInput.focus();
            });
            
            // 随机增加数据按钮事件
            randomAddBtn.addEventListener('click', addRandomData);
            
            // 清空所有数据按钮事件
            clearAllBtn.addEventListener('click', clearAllData);
            
            modifyBtn.addEventListener('click', () => {
                if (dataArray.length === 0) {
                    showToast('暂无数据可修改', 'info');
                    return;
                }
                modifyModal.classList.remove('hidden');
                modifyIndexInput.focus();
            });
            
            // 确认/取消按钮事件
            cancelAddSingle.addEventListener('click', hideAllModals);
            confirmAddSingle.addEventListener('click', addSingleData);
            
            cancelAddMultiple.addEventListener('click', hideAllModals);
            confirmAddMultiple.addEventListener('click', addMultipleData);
            
            cancelDelete.addEventListener('click', hideAllModals);
            confirmDelete.addEventListener('click', deleteData);
            
            cancelModify.addEventListener('click', hideAllModals);
            confirmModify.addEventListener('click', modifyData);
            
            // 点击模态框外部关闭
            window.addEventListener('click', (e) => {
                if (e.target === addSingleModal) hideAllModals();
                if (e.target === addMultipleModal) hideAllModals();
                if (e.target === deleteModal) hideAllModals();
                if (e.target === modifyModal) hideAllModals();
            });
            
            // 按ESC键关闭模态框
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    hideAllModals();
                }
            });
            
            // 回车键确认
            singleDataInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addSingleData();
            });
            
            multipleDataInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addMultipleData();
            });
            
            deleteIndexInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') deleteData();
            });
            
            modifyValueInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') modifyData();
            });
        }

        // 初始化应用
        function initApp() {
            initChart();
            updateAll();
            setupEventListeners();
            
            // 不添加任何示例数据，保持表格为空
            dataArray = [];
            updateAll();
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
